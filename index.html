<!DOCTYPE html>
<html>
<head>
    <title> CASE LIBRARY</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #0f172a;
            color: #fff;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: #1e293b;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #334155;
        }

        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 15px;
            background: #38bdf8;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }

        .btn:hover {
            background: #0ea5e9;
        }

        .qr {
            margin-top: 10px;
            width: 120px;
        }

        .qr-section {
            text-align: center;
            margin-top: 40px;
        }
    </style>

</head>

<body>

<h1> Case Categories</h1>

<div class="container">

    <div class="card">
        <h2>ACCOUNT TRANSFER</h2>
        <a href="accounttranfer.html" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>DECEASED CASE</h2>
        <a href="deceased.html" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>PASSBOOK LOST</h2>
        <a href="PassBOOKlost.html" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>FD TICKET LOST</h2>
        <a href="FDticketlost.html" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>BALANCE CONFIRMATION</h2>
        <a href="Balancecon.html" class="btn">Open</a>
    </div>

</div>

<div class="qr-section">
    <h2>Scan to Access Website</h2>
    <img src="index.png" class="qr">
</div>

</body>
</html>
